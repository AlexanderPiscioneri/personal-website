name: Build & Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main          # trigger on pushes to main
  workflow_dispatch:  # allow manual runs from the Actions tab

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"  # pin to a specific Flutter version

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Build
  # ─────────────────────────────────────────────
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true           # cache the Flutter SDK between runs

      - name: Install dependencies
        run: flutter pub get

      # - name: Run tests          # remove this step if you have no tests yet
      #   run: flutter test

      - name: Build for web
        run: |
          flutter build web \
            --release \
            --base-href "/"   # set to "/repo-name/" if NOT using a custom domain
                              # set to "/" if you ARE using a custom domain

      # ── Custom domain: add a CNAME file so GitHub Pages keeps the domain ──
      - name: Write CNAME
        run: echo "alexanderpiscioneri.com" > build/web/CNAME
        # Delete this step entirely if you want to use the default
        # <username>.github.io/<repo> URL instead.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web   # the directory produced by `flutter build web`

  # ─────────────────────────────────────────────
  # JOB 2 – Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4